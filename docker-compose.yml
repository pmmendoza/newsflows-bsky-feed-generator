# LOCAL / DEV ONLY — NOT a production/rebuild artifact.
# Production deployment uses the topology-declared compose at
# deploy/docker/feedgen/docker-compose.yml (digest-pinned image + postgres,
# per host_topology.yml). The image default below is intentionally a local
# convenience default and may be stale; override with FEEDGEN_IMAGE=<tag>.
# See dev/audits/centralization_drift_register_2026-06-18.md (DR-003).
services:
  feedgen:
    image: ${FEEDGEN_IMAGE:-pmmendoza/bsky-feedgen:catalog-publisher-dids-9e6a72b-20260605}
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedgen
    hostname: feedgen
    restart: unless-stopped
    ports:
      - "127.0.0.1:3020:3020"
    logging:
      options:
        max-size: 10m
    volumes:
      - ./subscribers.csv:/app/subscribers.csv
    environment:
      NODE_ENV: production
      FEEDGEN_PORT: 3020
      # FEEDGEN_SUBSCRIBER_ONLY removed 2026-05-04 (Sprint 10 Lane I).
      # Access decisions now go through the per-feed access_policy_id
      # dispatcher in src/util/access-policy.ts; auth is always
      # required. The env was an open-mode escape hatch that
      # re-introduced the same risk class as the 'open' policy that
      # was removed from the access_policy_id enum.
      FEEDGEN_SUBSCRIPTION_ENDPOINT: ${FEEDGEN_SUBSCRIPTION_ENDPOINT:-wss://bsky.network}
      FEEDGEN_HOSTNAME: ${FEEDGEN_HOSTNAME:-example.com}
      FEEDGEN_BUILD_SHA: ${FEEDGEN_BUILD_SHA:-""}
      FEEDGEN_DESCRIBE_FROM_CATALOG: ${FEEDGEN_DESCRIBE_FROM_CATALOG:-"false"}
      FEEDGEN_PUBLISHER_DID: ${FEEDGEN_PUBLISHER_DID}
      NEWSBOT_CZ_DID: ${NEWSBOT_CZ_DID}
      NEWSBOT_FR_DID: ${NEWSBOT_FR_DID}
      NEWSBOT_IR_DID: ${NEWSBOT_IR_DID}
      NEWSBOT_NL_DID: ${NEWSBOT_NL_DID}
      NEWSBOT_BE_DID: ${NEWSBOT_BE_DID}
      FOLLOWS_UPDATE_INTERVAL_MS: ${FOLLOWS_UPDATE_INTERVAL_MS:-3600000}
      # Database connection details
      FEEDGEN_DB_HOST: ${FEEDGEN_DB_HOST:-feedgen-db}
      FEEDGEN_DB_PORT: ${FEEDGEN_DB_PORT:-5432}
      FEEDGEN_DB_USER: ${FEEDGEN_DB_USER:-feedgen}
      FEEDGEN_DB_PASSWORD: ${FEEDGEN_DB_PASSWORD:-feedgen}
      FEEDGEN_DB_BASE: ${FEEDGEN_DB_BASE:-feedgen-db}
      ENGAGEMENT_TIME_HOURS: ${ENGAGEMENT_TIME_HOURS:-72}
      FEEDGEN_PRIORITY_API_KEY: ${FEEDGEN_PRIORITY_API_KEY:-''}
      FEEDGEN_MONITOR_API_KEY: ${FEEDGEN_MONITOR_API_KEY:-''}
      FEEDGEN_READ_API_KEY: ${FEEDGEN_READ_API_KEY:-''}
      FEEDGEN_ADMIN_API_KEY: ${FEEDGEN_ADMIN_API_KEY:-''}
      # Drift fix 2026-05-09 (R7 Phase D D2): the prior live feedgen had
      # FEEDGEN_RANKER_API_KEY set somehow (probably via an older compose
      # generation or shell export) but the canonical-source compose
      # never propagated it. After the D2 recreate, secret-health
      # surfaced 7 fails because of this. Now explicitly listed.
      FEEDGEN_RANKER_API_KEY: ${FEEDGEN_RANKER_API_KEY:-''}
      STUDY_TOKEN_API_KEY: ${STUDY_TOKEN_API_KEY:-''}
      STUDY_JWT_SECRET: ${STUDY_JWT_SECRET:-""}
      STUDY_JWT_TTL_SECONDS: ${STUDY_JWT_TTL_SECONDS:-345600}
      STUDY_COMPLIANCE_RATE_LIMIT_WINDOW_SECONDS: ${STUDY_COMPLIANCE_RATE_LIMIT_WINDOW_SECONDS:-60}
      STUDY_COMPLIANCE_RATE_LIMIT_MAX: ${STUDY_COMPLIANCE_RATE_LIMIT_MAX:-60}
      FEEDGEN_ARCHIVE_OUTBOX_ENABLED: ${FEEDGEN_ARCHIVE_OUTBOX_ENABLED:-'false'}
    networks:
      - default
      - caddy_network
    depends_on:
      - feedgen-db

  feedgen-db:
    image: postgres:17
    container_name: feedgen-db
    hostname: feedgen-db
    restart: unless-stopped
    ports:
      - "127.0.0.1:5435:5432"
    logging:
      options:
        max-size: 10m
    volumes:
      - db:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${FEEDGEN_DBBASE:-feedgen-db}
      POSTGRES_USER: ${FEEDGEN_DBUSER:-feedgen}
      POSTGRES_PASSWORD: ${FEEDGEN_DBPASSWORD:-feedgen}
    shm_size: 8gb
    ulimits:
      memlock:
        soft: -1
        hard: -1
    command:
      - postgres
      - -c
      - shared_buffers=32GB
      - -c
      - work_mem=256MB
      - -c
      - max_parallel_workers_per_gather=4
      - -c
      - max_parallel_workers=8
    networks:
      - default

volumes:
  extensions:
  db:
    external: true
    name: newsflows-bsky-feed-generator-v2_db_v2
  

networks:
  default:
  caddy_network:
    external: true
